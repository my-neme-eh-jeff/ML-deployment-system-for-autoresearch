dataset:
  csv_path: data/ieee_cis.parquet
  target_column: isFraud
  drop_columns: [TransactionID, TransactionDT]
  numeric_features: [TransactionAmt]
  categorical_features: []

preprocess:
  test_size: 0.2
  random_state: 42

train:
  model_type: HistGradientBoostingClassifier
  random_state: 42
  max_depth: 6
  n_estimators: 200
  learning_rate: 0.05
  subsample: 1.0
  min_samples_split: 2
  min_samples_leaf: 1
  class_weight: null
  bootstrap: true
  max_features: 1
  use_log_transform: false

evaluate:
  primary_metric: auc_roc
  auto_promote: true

auto_experiment:
  baseline_auc: 0.0
  min_improvement: 0.001
