dataset:
  csv_path: data/ieee_cis.parquet
  target_column: isFraud
  drop_columns: [TransactionID, TransactionDT]
  numeric_features: [TransactionAmt]
  categorical_features: [ProductCD]

preprocess:
  test_size: 0.2
  random_state: 42

train:
  model_type: DecisionTreeClassifier
  random_state: 42
  max_depth: null
  max_features: null
  n_estimators: 100
  min_samples_split: 2
  min_samples_leaf: 1
  class_weight: null
  bootstrap: true
  learning_rate: 0.1
  subsample: 1.0
  use_log_transform: false

evaluate:
  primary_metric: auc_roc
  auto_promote: true

# Read only by auto_experiment/auto_loop.py. Editing this never invalidates
# DVC stages because it's not declared as a `params:` dependency in dvc.yaml.
auto_experiment:
  baseline_auc: 0.0
  # 0.003 ≈ one standard error of AUC on a 40K-row test set; below this is noise.
  # Previously 0.001 — too low, the loop promoted on random fluctuations.
  min_improvement: 0.003
  # Stop the loop early after this many consecutive iters without improvement.
  # 0 disables. Counts: failed pipeline, reverted (sub-threshold), Claude errors.
  max_iterations_without_improvement: 10
