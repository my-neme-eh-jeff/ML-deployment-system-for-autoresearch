
# Schema for the dataset. Swap this block to plug in a new binary-classification CSV.
# preprocess / train / evaluate all read from here — no hardcoded column names elsewhere.
dataset:
  csv_path: data/churn_data.csv
  target_column: Churn
  # If the target is "Yes"/"No", "T"/"F", etc. — provide the mapping here. Omit if already 0/1.
  # Keys MUST be quoted: PyYAML parses bare Yes/No/On/Off as booleans.
  target_mapping: {"Yes": 1, "No": 0}
  drop_columns: [customerID]
  numeric_features: [tenure, MonthlyCharges, TotalCharges]
  categorical_features: [Contract, InternetService, PaymentMethod, TechSupport, OnlineSecurity, OnlineBackup, DeviceProtection, StreamingTV, StreamingMovies, MultipleLines, gender, SeniorCitizen, Partner, Dependents, PhoneService, PaperlessBilling]

preprocess:
  test_size: 0.2
  random_state: 42

train:
  model_type: HistGradientBoostingClassifier
  random_state: 42
  max_depth: 6
  n_estimators: 200
  learning_rate: 0.05
  subsample: 1.0

  # Knobs the autoresearch loop may flip on
  min_samples_split: 2
  min_samples_leaf: 1
  class_weight: null
  bootstrap: true
  max_features: 1
  use_log_transform: false

evaluate:
  primary_metric: auc_roc
  auto_promote: true

# Read only by auto_experiment/auto_loop.py. NOT a DVC dep, so editing this never
# invalidates DVC stages.
auto_experiment:
  baseline_auc: 0.0
  min_improvement: 0.001
