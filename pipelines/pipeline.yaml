# PIPELINE DEFINITION
# Name: classifier-training-pipeline
# Description: Full preprocess → train → evaluate DAG. params_yaml is the entire file content.
# Inputs:
#    mlflow_tracking_uri: str [Default: 'http://mlflow.mlflow.svc.cluster.local:5000']
#    params_yaml: str
#    raw_data_gcs_path: str [Default: 'gs://customer-churn-dvc-remote/raw/ieee_cis.parquet']
components:
  comp-evaluate:
    executorLabel: exec-evaluate
    inputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        run_id_artifact:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        test_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        mlflow_tracking_uri:
          parameterType: STRING
        params_yaml:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        metrics:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-preprocess:
    executorLabel: exec-preprocess
    inputDefinitions:
      parameters:
        params_yaml:
          parameterType: STRING
        raw_data_gcs_path:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        stats:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        test_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        train_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-train:
    executorLabel: exec-train
    inputDefinitions:
      artifacts:
        train_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        mlflow_tracking_uri:
          parameterType: STRING
        params_yaml:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        run_id_artifact:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-evaluate:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate(\n    params_yaml: str,\n    test_csv: dsl.Input[dsl.Dataset],\n\
          \    model_artifact: dsl.Input[dsl.Model],\n    run_id_artifact: dsl.Input[dsl.Artifact],\n\
          \    mlflow_tracking_uri: str,\n    metrics: dsl.Output[dsl.Artifact],\n\
          ) -> str:\n    \"\"\"Returns the MLflow run_id so callers can fetch metrics\
          \ by id.\"\"\"\n    import os\n    import shutil\n    import subprocess\n\
          \    from pathlib import Path\n\n    workdir = Path(\"/app\")\n    (workdir\
          \ / \"configs\").mkdir(parents=True, exist_ok=True)\n    (workdir / \"configs\"\
          \ / \"params.yaml\").write_text(params_yaml)\n\n    (workdir / \"data\"\
          \ / \"processed\").mkdir(parents=True, exist_ok=True)\n    (workdir / \"\
          models\").mkdir(parents=True, exist_ok=True)\n    shutil.copy(test_csv.path,\
          \ workdir / \"data\" / \"processed\" / \"test.csv\")\n    shutil.copy(model_artifact.path,\
          \ workdir / \"models\" / \"classifier.pkl\")\n    shutil.copy(run_id_artifact.path,\
          \ workdir / \"models\" / \"run_id.txt\")\n\n    env = {**os.environ, \"\
          MLFLOW_TRACKING_URI\": mlflow_tracking_uri}\n    subprocess.run([\"python\"\
          , \"src/evaluate.py\"], cwd=str(workdir), check=True, env=env)\n\n    shutil.copy(workdir\
          \ / \"metrics.json\", metrics.path)\n\n    run_id = (workdir / \"models\"\
          \ / \"run_id.txt\").read_text().strip()\n    print(f\"MLflow run_id: {run_id}\"\
          )\n    print(f\"Metrics: {Path(metrics.path).read_text()}\")\n    return\
          \ run_id\n\n"
        image: ghcr.io/my-neme-eh-jeff/churn-kfp:latest
        resources:
          cpuLimit: 0.5
          cpuRequest: 0.2
          memoryLimit: 1.073741824
          memoryRequest: 0.536870912
          resourceCpuLimit: 500m
          resourceCpuRequest: 200m
          resourceMemoryLimit: 1Gi
          resourceMemoryRequest: 512Mi
    exec-preprocess:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - preprocess
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef preprocess(\n    params_yaml: str,\n    raw_data_gcs_path: str,\n\
          \    train_csv: dsl.Output[dsl.Dataset],\n    test_csv: dsl.Output[dsl.Dataset],\n\
          \    stats: dsl.Output[dsl.Artifact],\n):\n    import shutil\n    import\
          \ subprocess\n    from pathlib import Path\n\n    workdir = Path(\"/app\"\
          )\n    (workdir / \"configs\").mkdir(parents=True, exist_ok=True)\n    (workdir\
          \ / \"configs\" / \"params.yaml\").write_text(params_yaml)\n\n    import\
          \ gcsfs\n    import yaml\n\n    cfg = yaml.safe_load(params_yaml)\n    csv_path\
          \ = cfg[\"dataset\"][\"csv_path\"]\n    (workdir / csv_path).parent.mkdir(parents=True,\
          \ exist_ok=True)\n    # Byte-level copy from GCS to local \u2014 avoids\
          \ loading the full dataframe\n    # into memory (a pd.read + pd.to_parquet\
          \ round-trip on the 200K-row IEEE-CIS\n    # parquet OOM'd this pod at the\
          \ 1 GiB limit, with no traceback).\n    gcsfs.GCSFileSystem().get(raw_data_gcs_path,\
          \ str(workdir / csv_path))\n\n    subprocess.run([\"python\", \"src/preprocess.py\"\
          ], cwd=str(workdir), check=True)\n\n    shutil.copy(workdir / \"data\" /\
          \ \"processed\" / \"train.csv\", train_csv.path)\n    shutil.copy(workdir\
          \ / \"data\" / \"processed\" / \"test.csv\", test_csv.path)\n    shutil.copy(workdir\
          \ / \"data\" / \"processed\" / \"stats.json\", stats.path)\n\n"
        image: ghcr.io/my-neme-eh-jeff/churn-kfp:latest
        resources:
          cpuLimit: 0.5
          cpuRequest: 0.2
          memoryLimit: 1.073741824
          memoryRequest: 0.536870912
          resourceCpuLimit: 500m
          resourceCpuRequest: 200m
          resourceMemoryLimit: 1Gi
          resourceMemoryRequest: 512Mi
    exec-train:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train(\n    params_yaml: str,\n    train_csv: dsl.Input[dsl.Dataset],\n\
          \    mlflow_tracking_uri: str,\n    model_artifact: dsl.Output[dsl.Model],\n\
          \    run_id_artifact: dsl.Output[dsl.Artifact],\n):\n    import os\n   \
          \ import shutil\n    import subprocess\n    from pathlib import Path\n\n\
          \    workdir = Path(\"/app\")\n    (workdir / \"configs\").mkdir(parents=True,\
          \ exist_ok=True)\n    (workdir / \"configs\" / \"params.yaml\").write_text(params_yaml)\n\
          \n    (workdir / \"data\" / \"processed\").mkdir(parents=True, exist_ok=True)\n\
          \    shutil.copy(train_csv.path, workdir / \"data\" / \"processed\" / \"\
          train.csv\")\n\n    env = {**os.environ, \"MLFLOW_TRACKING_URI\": mlflow_tracking_uri}\n\
          \    subprocess.run([\"python\", \"src/train.py\"], cwd=str(workdir), check=True,\
          \ env=env)\n\n    shutil.copy(workdir / \"models\" / \"classifier.pkl\"\
          , model_artifact.path)\n    shutil.copy(workdir / \"models\" / \"run_id.txt\"\
          , run_id_artifact.path)\n\n"
        image: ghcr.io/my-neme-eh-jeff/churn-kfp:latest
        resources:
          cpuLimit: 1.0
          cpuRequest: 0.3
          memoryLimit: 2.147483648
          memoryRequest: 0.536870912
          resourceCpuLimit: '1'
          resourceCpuRequest: 300m
          resourceMemoryLimit: 2Gi
          resourceMemoryRequest: 512Mi
pipelineInfo:
  description: "Full preprocess \u2192 train \u2192 evaluate DAG. params_yaml is the\
    \ entire file content."
  name: classifier-training-pipeline
root:
  dag:
    tasks:
      evaluate:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluate
        dependentTasks:
        - preprocess
        - train
        inputs:
          artifacts:
            model_artifact:
              taskOutputArtifact:
                outputArtifactKey: model_artifact
                producerTask: train
            run_id_artifact:
              taskOutputArtifact:
                outputArtifactKey: run_id_artifact
                producerTask: train
            test_csv:
              taskOutputArtifact:
                outputArtifactKey: test_csv
                producerTask: preprocess
          parameters:
            mlflow_tracking_uri:
              componentInputParameter: mlflow_tracking_uri
            params_yaml:
              componentInputParameter: params_yaml
        taskInfo:
          name: evaluate
      preprocess:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-preprocess
        inputs:
          parameters:
            params_yaml:
              componentInputParameter: params_yaml
            raw_data_gcs_path:
              componentInputParameter: raw_data_gcs_path
        taskInfo:
          name: preprocess
      train:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train
        dependentTasks:
        - preprocess
        inputs:
          artifacts:
            train_csv:
              taskOutputArtifact:
                outputArtifactKey: train_csv
                producerTask: preprocess
          parameters:
            mlflow_tracking_uri:
              componentInputParameter: mlflow_tracking_uri
            params_yaml:
              componentInputParameter: params_yaml
        taskInfo:
          name: train
  inputDefinitions:
    parameters:
      mlflow_tracking_uri:
        defaultValue: http://mlflow.mlflow.svc.cluster.local:5000
        isOptional: true
        parameterType: STRING
      params_yaml:
        parameterType: STRING
      raw_data_gcs_path:
        defaultValue: gs://customer-churn-dvc-remote/raw/ieee_cis.parquet
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
