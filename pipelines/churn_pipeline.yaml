# PIPELINE DEFINITION
# Name: churn-prediction-pipeline
# Inputs:
#    mlflow_tracking_uri: str [Default: 'http://mlflow.mlflow.svc.cluster.local:5000']
#    n_estimators: int [Default: 100.0]
#    raw_data_gcs_path: str [Default: 'gs://customer-churn-dvc-remote/raw/churn_data.csv']
#    test_size: float [Default: 0.2]
components:
  comp-evaluate:
    executorLabel: exec-evaluate
    inputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        test_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        mlflow_tracking_uri:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        metrics:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-preprocess:
    executorLabel: exec-preprocess
    inputDefinitions:
      parameters:
        raw_data_gcs_path:
          parameterType: STRING
        test_size:
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        stats:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        test_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        train_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-train:
    executorLabel: exec-train
    inputDefinitions:
      artifacts:
        train_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        mlflow_tracking_uri:
          parameterType: STRING
        n_estimators:
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-evaluate:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate(\n    test_csv: dsl.Input[dsl.Dataset],\n    model_artifact:\
          \ dsl.Input[dsl.Model],\n    mlflow_tracking_uri: str,\n    metrics: dsl.Output[dsl.Artifact],\n\
          ):\n    \"\"\"Evaluate model and handle champion/challenger promotion.\"\
          \"\"\n    import json\n    import pickle\n\n    import mlflow\n    import\
          \ pandas as pd\n    from sklearn.metrics import accuracy_score, f1_score,\
          \ roc_auc_score\n\n    TARGET = \"Churn\"\n    MODEL_NAME = \"churn-model\"\
          \n\n    df = pd.read_csv(test_csv.path)\n    X = df.drop(columns=[TARGET])\n\
          \    y = df[TARGET]\n\n    with open(model_artifact.path, \"rb\") as f:\n\
          \        model = pickle.load(f)\n\n    y_pred = model.predict(X)\n    y_proba\
          \ = model.predict_proba(X)[:, 1]\n\n    results = {\n        \"accuracy\"\
          : round(accuracy_score(y, y_pred), 4),\n        \"auc_roc\": round(roc_auc_score(y,\
          \ y_proba), 4),\n        \"f1\": round(f1_score(y, y_pred), 4),\n    }\n\
          \n    with open(metrics.path, \"w\") as f:\n        json.dump(results, f,\
          \ indent=2)\n\n    mlflow.set_tracking_uri(mlflow_tracking_uri)\n    mlflow.set_experiment(\"\
          churn-prediction-kfp\")\n\n    last_run = mlflow.search_runs(\n        experiment_names=[\"\
          churn-prediction-kfp\"],\n        order_by=[\"start_time DESC\"],\n    \
          \    max_results=1,\n    )\n\n    if not last_run.empty:\n        with mlflow.start_run(run_id=last_run.iloc[0][\"\
          run_id\"]):\n            mlflow.log_metrics(results)\n\n    # Champion/challenger\
          \ promotion\n    client = mlflow.MlflowClient(mlflow_tracking_uri)\n   \
          \ versions = client.search_model_versions(f\"name='{MODEL_NAME}'\")\n  \
          \  if not versions:\n        return\n\n    new_version = max(versions, key=lambda\
          \ v: int(v.version))\n\n    try:\n        champion = client.get_model_version_by_alias(MODEL_NAME,\
          \ \"champion\")\n        champion_run = client.get_run(champion.run_id)\n\
          \        champion_auc = champion_run.data.metrics.get(\"auc_roc\", 0)\n\n\
          \        if results[\"auc_roc\"] > champion_auc:\n            client.set_registered_model_alias(\n\
          \                MODEL_NAME, \"champion\", new_version.version\n       \
          \     )\n            print(\n                f\"New champion: v{new_version.version}\
          \ (AUC: {results['auc_roc']} > {champion_auc})\"\n            )\n      \
          \  else:\n            client.set_registered_model_alias(\n             \
          \   MODEL_NAME, \"challenger\", new_version.version\n            )\n   \
          \         print(\n                f\"Challenger only: v{new_version.version}\
          \ (AUC: {results['auc_roc']} <= {champion_auc})\"\n            )\n    except\
          \ Exception:\n        client.set_registered_model_alias(MODEL_NAME, \"champion\"\
          , new_version.version)\n        print(f\"First model \u2014 v{new_version.version}\
          \ promoted to champion\")\n\n"
        image: ghcr.io/my-neme-eh-jeff/churn-kfp:latest
        resources:
          cpuLimit: 0.5
          cpuRequest: 0.2
          memoryLimit: 1.073741824
          memoryRequest: 0.536870912
          resourceCpuLimit: 500m
          resourceCpuRequest: 200m
          resourceMemoryLimit: 1Gi
          resourceMemoryRequest: 512Mi
    exec-preprocess:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - preprocess
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef preprocess(\n    raw_data_gcs_path: str,\n    test_size: float,\n\
          \    train_csv: dsl.Output[dsl.Dataset],\n    test_csv: dsl.Output[dsl.Dataset],\n\
          \    stats: dsl.Output[dsl.Artifact],\n):\n    \"\"\"Clean raw data and\
          \ split into train/test.\"\"\"\n    import json\n\n    import pandas as\
          \ pd\n    from sklearn.model_selection import train_test_split\n\n    TARGET\
          \ = \"Churn\"\n\n    df = pd.read_csv(raw_data_gcs_path)\n\n    df[\"TotalCharges\"\
          ] = pd.to_numeric(df[\"TotalCharges\"], errors=\"coerce\")\n    df[\"TotalCharges\"\
          ] = df[\"TotalCharges\"].fillna(df[\"TotalCharges\"].median())\n    df[TARGET]\
          \ = df[TARGET].map({\"Yes\": 1, \"No\": 0})\n    df = df.drop(columns=[\"\
          customerID\"])\n\n    train_df, test_df = train_test_split(\n        df,\
          \ test_size=test_size, random_state=42, stratify=df[TARGET]\n    )\n\n \
          \   train_df.to_csv(train_csv.path, index=False)\n    test_df.to_csv(test_csv.path,\
          \ index=False)\n\n    stats_data = {\n        \"total_rows\": len(df),\n\
          \        \"train_rows\": len(train_df),\n        \"test_rows\": len(test_df),\n\
          \        \"churn_rate\": float(df[TARGET].mean()),\n    }\n    with open(stats.path,\
          \ \"w\") as f:\n        json.dump(stats_data, f, indent=2)\n\n"
        image: ghcr.io/my-neme-eh-jeff/churn-kfp:latest
        resources:
          cpuLimit: 0.5
          cpuRequest: 0.2
          memoryLimit: 1.073741824
          memoryRequest: 0.536870912
          resourceCpuLimit: 500m
          resourceCpuRequest: 200m
          resourceMemoryLimit: 1Gi
          resourceMemoryRequest: 512Mi
    exec-train:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train(\n    train_csv: dsl.Input[dsl.Dataset],\n    n_estimators:\
          \ int,\n    mlflow_tracking_uri: str,\n    model_artifact: dsl.Output[dsl.Model],\n\
          ):\n    \"\"\"Train a RandomForest model and register in MLflow.\"\"\"\n\
          \    import pickle\n\n    import mlflow\n    import pandas as pd\n    from\
          \ sklearn.compose import ColumnTransformer\n    from sklearn.ensemble import\
          \ RandomForestClassifier\n    from sklearn.pipeline import Pipeline\n  \
          \  from sklearn.preprocessing import OneHotEncoder, StandardScaler\n\n \
          \   NUMERIC_FEATURES = [\"SeniorCitizen\", \"tenure\", \"MonthlyCharges\"\
          , \"TotalCharges\"]\n    CATEGORICAL_FEATURES = [\n        \"gender\",\n\
          \        \"Partner\",\n        \"Dependents\",\n        \"PhoneService\"\
          ,\n        \"MultipleLines\",\n        \"InternetService\",\n        \"\
          OnlineSecurity\",\n        \"OnlineBackup\",\n        \"DeviceProtection\"\
          ,\n        \"TechSupport\",\n        \"StreamingTV\",\n        \"StreamingMovies\"\
          ,\n        \"Contract\",\n        \"PaperlessBilling\",\n        \"PaymentMethod\"\
          ,\n    ]\n    TARGET = \"Churn\"\n\n    df = pd.read_csv(train_csv.path)\n\
          \    X = df.drop(columns=[TARGET])\n    y = df[TARGET]\n\n    preprocessor\
          \ = ColumnTransformer(\n        transformers=[\n            (\"num\", StandardScaler(),\
          \ NUMERIC_FEATURES),\n            (\n                \"cat\",\n        \
          \        OneHotEncoder(handle_unknown=\"ignore\", sparse_output=False),\n\
          \                CATEGORICAL_FEATURES,\n            ),\n        ]\n    )\n\
          \    pipeline = Pipeline(\n        [\n            (\"preprocessor\", preprocessor),\n\
          \            (\n                \"classifier\",\n                RandomForestClassifier(n_estimators=n_estimators,\
          \ random_state=42),\n            ),\n        ]\n    )\n    pipeline.fit(X,\
          \ y)\n\n    with open(model_artifact.path, \"wb\") as f:\n        pickle.dump(pipeline,\
          \ f)\n\n    mlflow.set_tracking_uri(mlflow_tracking_uri)\n    mlflow.set_experiment(\"\
          churn-prediction-kfp\")\n\n    with mlflow.start_run(run_name=\"kfp-train\"\
          ):\n        mlflow.log_param(\"n_estimators\", n_estimators)\n        mlflow.log_param(\"\
          n_train_samples\", X.shape[0])\n        mlflow.log_param(\"orchestrator\"\
          , \"kubeflow-pipelines\")\n        mlflow.sklearn.log_model(\n         \
          \   pipeline,\n            artifact_path=\"model\",\n            registered_model_name=\"\
          churn-model\",\n        )\n\n"
        image: ghcr.io/my-neme-eh-jeff/churn-kfp:latest
        resources:
          cpuLimit: 1.0
          cpuRequest: 0.3
          memoryLimit: 2.147483648
          memoryRequest: 0.536870912
          resourceCpuLimit: '1'
          resourceCpuRequest: 300m
          resourceMemoryLimit: 2Gi
          resourceMemoryRequest: 512Mi
pipelineInfo:
  name: churn-prediction-pipeline
root:
  dag:
    tasks:
      evaluate:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluate
        dependentTasks:
        - preprocess
        - train
        inputs:
          artifacts:
            model_artifact:
              taskOutputArtifact:
                outputArtifactKey: model_artifact
                producerTask: train
            test_csv:
              taskOutputArtifact:
                outputArtifactKey: test_csv
                producerTask: preprocess
          parameters:
            mlflow_tracking_uri:
              componentInputParameter: mlflow_tracking_uri
        taskInfo:
          name: evaluate
      preprocess:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-preprocess
        inputs:
          parameters:
            raw_data_gcs_path:
              componentInputParameter: raw_data_gcs_path
            test_size:
              componentInputParameter: test_size
        taskInfo:
          name: preprocess
      train:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train
        dependentTasks:
        - preprocess
        inputs:
          artifacts:
            train_csv:
              taskOutputArtifact:
                outputArtifactKey: train_csv
                producerTask: preprocess
          parameters:
            mlflow_tracking_uri:
              componentInputParameter: mlflow_tracking_uri
            n_estimators:
              componentInputParameter: n_estimators
        taskInfo:
          name: train
  inputDefinitions:
    parameters:
      mlflow_tracking_uri:
        defaultValue: http://mlflow.mlflow.svc.cluster.local:5000
        isOptional: true
        parameterType: STRING
      n_estimators:
        defaultValue: 100.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      raw_data_gcs_path:
        defaultValue: gs://customer-churn-dvc-remote/raw/churn_data.csv
        isOptional: true
        parameterType: STRING
      test_size:
        defaultValue: 0.2
        isOptional: true
        parameterType: NUMBER_DOUBLE
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
