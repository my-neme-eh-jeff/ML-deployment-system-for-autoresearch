# MLflow tracking server (GKE).
# Backend: CloudSQL Postgres via cloud-sql-proxy sidecar; artifacts on GCS via Workload Identity.
# Prereqs: cloudsql-password Secret in this namespace; mlflow-sa SA bound to GCP SA.

apiVersion: v1
kind: Namespace
metadata:
  name: mlflow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      serviceAccountName: mlflow-sa
      containers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.4
          args:
            - "project-8018ed81-1dfe-470e-aad:asia-south1:churn-mlflow"
            - "--port=5432"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

        # MLflow 3.11.1, pinned to the exact digest currently running. The DB
        # schema has been migrated against this image; tag-pinning (`:v3.11.1`
        # or `:latest`) caused recurring CrashLoopBackOff when ghcr rebuilt the
        # tag with a newer schema. To bump: run `mlflow db upgrade` (one-shot
        # Job with cloud-sql-proxy sidecar), then update this digest.
        - name: mlflow
          image: ghcr.io/mlflow/mlflow@sha256:c4cfc7eb77caf73c84b084d93456bc904500884a93b5348934ae42b351cc1263
          command: ["mlflow", "server"]
          args:
            - --backend-store-uri=postgresql://mlflow_user:$(CLOUDSQL_PASSWORD)@127.0.0.1:5432/mlflow_db
            - --artifacts-destination=gs://churn-mlflow-artifacts-project-8018ed81
            - --serve-artifacts
            - --host=0.0.0.0
            - --port=5000
            # MLflow 3.x's CORS/DNS-rebinding middleware returns INTERNAL_ERROR for
            # requests originating from its own LoadBalancer IP. Disabled here because
            # the LB is the only ingress.
            - --disable-security-middleware
          env:
            - name: CLOUDSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudsql-password
                  key: password
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              # `--serve-artifacts` proxies the entire model pickle through
              # uvicorn during `mlflow.sklearn.log_model`. A RandomForest on
              # 200K × ~330 features pickles to 1–1.5 GiB; staging it inside
              # the proxy hits the 2 GiB limit and the pod OOMKills mid-upload
              # — which silently hangs the training container's HTTP call and
              # eventually fails the KFP run. 4 GiB gives the proxy room for
              # the model bytes + Python runtime + concurrent requests.
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlflow
spec:
  type: LoadBalancer
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
