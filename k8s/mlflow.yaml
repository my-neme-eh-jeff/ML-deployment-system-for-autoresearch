# MLflow tracking server — GKE production version.
#
# Changes from local vind version:
#   - SQLite + PVC replaced by CloudSQL PostgreSQL (managed, persistent, HA-ready)
#   - Local PVC artifacts replaced by GCS bucket (durable, portable)
#   - Cloud SQL Auth Proxy sidecar for secure DB connection via Workload Identity
#   - serviceAccountName: mlflow-sa (Workload Identity → GCS + CloudSQL access)
#   - Service type: LoadBalancer (public IP for UI access + CI/CD)
#
# Prerequisites:
#   1. Run scripts/setup-gcp.sh to create CloudSQL instance, GCS bucket, service accounts
#   2. kubectl apply -f k8s/serviceaccounts.yaml
#   3. Create the cloudsql-password secret:
#      kubectl create secret generic cloudsql-password \
#        --from-literal=password=YOUR_SECURE_PASSWORD \
#        -n mlflow
#
# Replace project-8018ed81-1dfe-470e-aad and CLOUDSQL_INSTANCE_CONNECTION with your values.

apiVersion: v1
kind: Namespace
metadata:
  name: mlflow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      serviceAccountName: mlflow-sa
      containers:
        # ── Cloud SQL Auth Proxy sidecar ──────────────────────────────────
        # Provides a local TCP connection to CloudSQL via Workload Identity.
        # MLflow connects to 127.0.0.1:5432 — the proxy tunnels to CloudSQL.
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.4
          args:
            # Format: project-8018ed81-1dfe-470e-aad:REGION:INSTANCE_NAME
            # Replace with your actual connection name from:
            #   gcloud sql instances describe churn-mlflow --format="value(connectionName)"
            - "project-8018ed81-1dfe-470e-aad:asia-south1:churn-mlflow"
            - "--port=5432"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

        # ── MLflow server ─────────────────────────────────────────────────
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:latest
          command: ["mlflow", "server"]
          args:
            # PostgreSQL via Cloud SQL Proxy (localhost)
            - --backend-store-uri=postgresql://mlflow_user:$(CLOUDSQL_PASSWORD)@127.0.0.1:5432/mlflow_db
            # GCS for artifacts — Workload Identity handles auth automatically
            # Replace MLFLOW_ARTIFACTS_BUCKET with your bucket name
            - --artifacts-destination=gs://churn-mlflow-artifacts-project-8018ed81
            - --serve-artifacts
            - --host=0.0.0.0
            - --port=5000
            # Disable MLflow's security middleware (CORS + DNS rebinding protection).
            # Safe for this GKE internal deployment — access is controlled at the
            # network layer (GKE LoadBalancer). Without this, the UI returns
            # INTERNAL_ERROR on all API calls because MLflow 3.x blocks requests
            # from its own IP as "cross-origin".
            - --disable-security-middleware
          env:
            - name: CLOUDSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudsql-password
                  key: password
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlflow
spec:
  # LoadBalancer gives a stable public IP for:
  #   1. MLflow UI access
  #   2. CI/CD connecting to the real MLflow (no more ephemeral instances)
  type: LoadBalancer
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
