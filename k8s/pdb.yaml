# PodDisruptionBudgets ensure at least one pod stays running during
# GKE node maintenance, cluster upgrades, or autoscaler drain events.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: inference-api-pdb
  namespace: inference
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: inference-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mlflow-pdb
  namespace: mlflow
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mlflow
