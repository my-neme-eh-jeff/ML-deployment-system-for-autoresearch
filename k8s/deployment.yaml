apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: inference
  labels:
    app: inference-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
      # The autoresearch loop bumps these two annotations on every kept iter
      # via a GitHub-App commit. Because they live on the pod template (not
      # just metadata), changing them mutates the PodSpec hash and Kubernetes
      # performs a native rolling restart. New pods reload `@champion` from
      # MLflow at startup, so users see the latest model within the rollout
      # window without any image rebuild.
      annotations:
        mlops/classifier-version: "3"
        mlops/classifier-run-id: "fe370361bb29461e88a76005cc1a4c9f"
    spec:
      serviceAccountName: inference-api-sa
      # Pod Security `restricted` baseline. uid 10001 matches the `app` user
      # baked into Dockerfile; if you bump one, bump both. seccompProfile +
      # capabilities.drop:[ALL] follow the same defaults the GKE Autopilot
      # baseline expects.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: inference-api
          # CI rewrites this image SHA on every push to main.
          image: ghcr.io/my-neme-eh-jeff/inference-api:0776f558a4114ee588230b3a6a986e8cae29312b
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.mlflow.svc.cluster.local:5000
          # Liveness on /health/live (always 200) so a slow model load doesn't kill
          # the pod; readiness on /health (503 until @champion is loaded).
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
