apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-api
  namespace: churn-serving
  labels:
    app: churn-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: churn-api
  template:
    metadata:
      labels:
        app: churn-api
    spec:
      serviceAccountName: churn-api-sa
      containers:
        - name: churn-api
          # CI rewrites this image SHA on every push to main.
          image: ghcr.io/my-neme-eh-jeff/churn-api:abd6764e7f58f1bbbee7b60ea9eb096e98b5fcb6
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.mlflow.svc.cluster.local:5000
          # Liveness on /health/live (always 200) so a slow model load doesn't kill
          # the pod; readiness on /health (503 until @champion is loaded).
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
