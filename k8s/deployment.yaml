apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: inference
  labels:
    app: inference-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
      # The autoresearch loop bumps these two annotations on every kept iter
      # via a GitHub-App commit. Because they live on the pod template (not
      # just metadata), changing them mutates the PodSpec hash and Kubernetes
      # performs a native rolling restart. New pods reload `@champion` from
      # MLflow at startup, so users see the latest model within the rollout
      # window without any image rebuild.
      annotations:
        mlops/classifier-version: "5"
        mlops/classifier-run-id: "69d309ac56ad4b8790e2f1a5f88028f1"
    spec:
      serviceAccountName: inference-api-sa
      containers:
        - name: inference-api
          # CI rewrites this image SHA on every push to main.
          image: ghcr.io/my-neme-eh-jeff/inference-api:75d80f2f72fab9f714f08844f5b1568147c8cb67
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.mlflow.svc.cluster.local:5000
          # Liveness on /health/live (always 200) so a slow model load doesn't kill
          # the pod; readiness on /health (503 until @champion is loaded).
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
