apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-api
  namespace: churn-serving
  labels:
    app: churn-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: churn-api
  template:
    metadata:
      labels:
        app: churn-api
    spec:
      serviceAccountName: churn-api-sa
      containers:
        - name: churn-api
          # GKE: image is updated by CI to Artifact Registry path.
          # Local vind: override with ghcr.io/my-neme-eh-jeff/churn-api:latest
          # CI will replace this line with the Artifact Registry path + commit SHA.
          image: ghcr.io/my-neme-eh-jeff/churn-api:b2b4cd7083f16ab8bbbe2756f18e3b26e43ce71d
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.mlflow.svc.cluster.local:5000
          # Liveness: is the process alive? Uses /health/live (always 200).
          # Kills and restarts only if the process is truly dead.
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          # Readiness: is the model loaded? Uses /health (503 until model loads).
          # Holds back traffic until the model is ready — pod stays alive.
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
