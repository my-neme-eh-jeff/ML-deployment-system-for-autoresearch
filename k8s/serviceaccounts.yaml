# Kubernetes Service Accounts with Workload Identity annotations.
# These bind K8s SAs to GCP SAs so pods get GCS/CloudSQL access via
# short-lived OAuth tokens — no service account keys in the cluster.
#
# Prerequisites: run scripts/setup-gcp.sh first, then replace project-8018ed81-1dfe-470e-aad.
# After applying, run the WI binding commands from setup-gcp.sh output.
#
# Apply: kubectl apply -f k8s/serviceaccounts.yaml

# ── mlflow namespace ───────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: mlflow
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlflow-sa
  namespace: mlflow
  annotations:
    # Replace project-8018ed81-1dfe-470e-aad with your GCP project ID
    iam.gke.io/gcp-service-account: mlflow-sa@project-8018ed81-1dfe-470e-aad.iam.gserviceaccount.com
---
# ── kubeflow-pipelines namespace ──────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: kubeflow-pipelines
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kfp-sa
  namespace: kubeflow-pipelines
  annotations:
    # Replace project-8018ed81-1dfe-470e-aad with your GCP project ID
    iam.gke.io/gcp-service-account: kfp-sa@project-8018ed81-1dfe-470e-aad.iam.gserviceaccount.com
---
# ── churn-serving namespace ───────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: churn-serving
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: churn-api-sa
  namespace: churn-serving
  # churn-api only needs to call MLflow via HTTP (no GCS direct access)
  # so no GCP SA annotation needed here — just restrict pod RBAC
