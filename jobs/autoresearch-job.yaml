---
# Autoresearch Job — submit with `make autoresearch-run` (which timestamps the name).
apiVersion: batch/v1
kind: Job
metadata:
  name: autoresearch-smoke
  namespace: churn-serving
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: autoresearch
    spec:
      serviceAccountName: autoresearch-sa
      restartPolicy: Never
      containers:
        - name: loop
          image: ghcr.io/my-neme-eh-jeff/churn-autoresearch:latest
          imagePullPolicy: Always
          # `make autoresearch-run` rewrites the next line via sed.
          # args: [REWRITE_ME]
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic
                  key: ANTHROPIC_API_KEY
            # All 6 GitHub-App vars must be set for the GraphQL commit path.
            - name: GITHUB_APP_ID
              value: "3576508"
            - name: GITHUB_INSTALLATION_ID
              value: "128892452"
            - name: GITHUB_OWNER
              value: "my-neme-eh-jeff"
            - name: GITHUB_REPO
              value: "customer_churn_CICD"
            - name: GCP_PROJECT
              value: "project-8018ed81-1dfe-470e-aad"
            - name: GITHUB_PEM_SECRET
              value: "github-app-key"
            - name: AUTORESEARCH_RUN_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests: { cpu: "200m", memory: 512Mi }
            limits:   { cpu: "1",    memory: 2Gi }
