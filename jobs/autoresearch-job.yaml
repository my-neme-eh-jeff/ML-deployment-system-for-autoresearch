---
# Autoresearch Job — submit with `make autoresearch-run` (which timestamps the name).
apiVersion: batch/v1
kind: Job
metadata:
  name: autoresearch-smoke
  namespace: inference
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  # 24h sanity backstop. The real per-run cap is `--hours` on the loop CLI,
  # which is set per-invocation via `AUTORESEARCH_HOURS` (Makefile default 2h,
  # override at submit time). A bigger ceiling here means a run with --hours=6
  # is not killed mid-iter because the Job spec was stricter than the loop's
  # own budget. Cost-control is the loop's job (it has --max-cost-usd); this
  # is purely a "don't keep this pod alive forever" backstop.
  activeDeadlineSeconds: 86400
  template:
    metadata:
      labels:
        app: autoresearch
    spec:
      serviceAccountName: autoresearch-sa
      restartPolicy: Never
      # Pod Security `restricted` baseline. uid 10001 matches the `app` user
      # baked into Dockerfile.autoresearch — bump both together.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: loop
          image: ghcr.io/my-neme-eh-jeff/autoresearch-loop:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          # `make autoresearch-run` rewrites the next line via sed.
          # args: [REWRITE_ME]
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic
                  key: ANTHROPIC_API_KEY
            # All 6 GitHub-App vars must be set for the GraphQL commit path.
            - name: GITHUB_APP_ID
              value: "3576508"
            - name: GITHUB_INSTALLATION_ID
              value: "128892452"
            - name: GITHUB_OWNER
              value: "my-neme-eh-jeff"
            - name: GITHUB_REPO
              value: "ML-deployment-system-for-autoresearch"
            - name: GCP_PROJECT
              value: "project-8018ed81-1dfe-470e-aad"
            - name: GITHUB_PEM_SECRET
              value: "github-app-key"
            - name: AUTORESEARCH_RUN_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests: { cpu: "200m", memory: 512Mi }
            limits:   { cpu: "1",    memory: 2Gi }
