---
# Autoresearch Loop — runs as a Kubernetes Job inside the cluster.
#
# v1 (PR-1): smoke-test only — image runs the default CMD (import + env check) and exits 0.
# v2 (PR-2): adds serviceAccountName + dvc pull + 1-iter dry-run.
# v3 (PR-3): adds GitHub App auth Secret + GraphQL commit on a feature branch.
#
# Submit one run with:
#   kubectl create -f k8s/autoresearch-job.yaml
# Or, with a unique name per submission:
#   sed "s/autoresearch-smoke/autoresearch-$(date +%Y%m%d-%H%M%S)/" k8s/autoresearch-job.yaml | kubectl create -f -
#
# Watch:
#   kubectl logs -n churn-serving -l job-name=autoresearch-smoke -f
apiVersion: batch/v1
kind: Job
metadata:
  name: autoresearch-smoke
  namespace: churn-serving
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: autoresearch
    spec:
      serviceAccountName: autoresearch-sa  # WI-bound for dvc pull (and PR-3 secret access)
      restartPolicy: Never
      containers:
        - name: loop
          image: ghcr.io/my-neme-eh-jeff/churn-autoresearch:latest
          imagePullPolicy: Always
          # Default args (from Dockerfile CMD): --n-experiments 1 --dry-run
          # Override here to run more iterations:
          # args: ["--n-experiments", "5", "--hours", "1.0"]
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic
                  key: ANTHROPIC_API_KEY
            # GitHub App config — auto_loop reads this via github_config_from_env().
            # All 6 env vars must be set for the App-commit path to activate.
            - name: GITHUB_APP_ID
              value: "3576508"
            - name: GITHUB_INSTALLATION_ID
              value: "128892452"
            - name: GITHUB_OWNER
              value: "my-neme-eh-jeff"
            - name: GITHUB_REPO
              value: "customer_churn_CICD"
            - name: GCP_PROJECT
              value: "project-8018ed81-1dfe-470e-aad"
            - name: GITHUB_PEM_SECRET
              value: "github-app-key"
            # Use the pod name (timestamped) as the run ID — branch = auto/run-<pod>.
            - name: AUTORESEARCH_RUN_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests: { cpu: "200m", memory: 512Mi }
            limits:   { cpu: "1",    memory: 2Gi }
