name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/ pipelines/

      - name: Format check
        run: uv run ruff format --check src/ tests/ pipelines/

      - name: Run tests
        run: uv run pytest tests/ -v

  pipeline:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Serialize pipeline runs on main so two near-simultaneous autoresearch
    # PR-merges can't race on the deployment.yaml SHA bump push.
    concurrency:
      group: model-promote
      cancel-in-progress: false
    permissions:
      contents: write   # to push deployment.yaml image tag update back to main
      packages: write   # to push image to ghcr.io
      id-token: write   # for GCP Workload Identity Federation
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          # Need enough history for paths-filter to compare HEAD against
          # github.event.before — which can be N commits back when a push
          # contains multiple commits. fetch-depth: 2 was too shallow and
          # caused state-only commits to silently skip image rebuilds.
          fetch-depth: 50

      # Detect which subtrees changed. Each output flips an `if:` on the work
      # below, so a docs-only push exits the job in seconds instead of running
      # ~14 minutes of multi-arch docker builds.
      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            training:
              - 'src/**'
              - 'configs/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'dvc.yaml'
              - 'data/**'
            api:
              - 'Dockerfile'
              - 'src/**'
              - 'pyproject.toml'
              - 'uv.lock'
            kfp:
              - 'Dockerfile.kfp'
              - 'src/**'
              - 'configs/**'
              - 'pyproject.toml'
              - 'uv.lock'
            autoresearch:
              - 'Dockerfile.autoresearch'
              - 'auto_experiment/**'
              - 'src/**'
              - 'configs/**'
              - 'pipelines/**'
              - '.dvc/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'dvc.yaml'
              - 'dvc.lock'
              - 'data/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'scripts/**'

      - name: Install uv
        if: steps.changes.outputs.training == 'true'
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        if: steps.changes.outputs.training == 'true'
        run: uv python install 3.12

      - name: Install dependencies
        if: steps.changes.outputs.training == 'true' || steps.changes.outputs.api == 'true'
        run: uv sync --no-dev

      # Auth to GCP via Workload Identity Federation. Needed by:
      # - `Pull data from DVC` (GCS read on the dvc remote)  → gated below
      # - `Open inference-image-bump PR (auto-merge)`        → fetches the
      #   GitHub App PEM from Secret Manager. So we trigger auth on
      #   `api OR training`, not just training.
      - name: Authenticate to GCP (Workload Identity Federation)
        if: steps.changes.outputs.training == 'true' || steps.changes.outputs.api == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/399695368426/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: churn-cicd@project-8018ed81-1dfe-470e-aad.iam.gserviceaccount.com

      - name: Pull data from DVC
        if: steps.changes.outputs.training == 'true'
        run: uv run dvc pull

      - name: Start ephemeral MLflow tracking server
        if: steps.changes.outputs.training == 'true'
        run: |
          uv run mlflow server \
            --backend-store-uri=sqlite:///mlflow_ci.db \
            --artifacts-destination=./mlflow_artifacts \
            --serve-artifacts \
            --port 5000 &
          sleep 8

      - name: Run DVC pipeline
        if: steps.changes.outputs.training == 'true'
        # --force so CI re-runs the train stage with its own ephemeral
        # MLflow. Without this, evaluate.py reads a cached run_id.txt
        # pointing at a run in some OTHER MLflow instance (the local one
        # used at bootstrap time) and fails with RESOURCE_DOES_NOT_EXIST.
        run: uv run dvc repro --force
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000

      - name: Push updated artifacts to GCS
        if: steps.changes.outputs.training == 'true'
        run: uv run dvc push

      - name: Set up Docker Buildx
        if: steps.changes.outputs.api == 'true' || steps.changes.outputs.kfp == 'true' || steps.changes.outputs.autoresearch == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.api == 'true' || steps.changes.outputs.kfp == 'true' || steps.changes.outputs.autoresearch == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Single-arch amd64 only. GKE Autopilot nodes are amd64. arm64 was only
      # for `make docker-run` on a Mac, which devs build locally. Multi-arch
      # via QEMU was tripling each docker build's wall-clock time.
      - name: Build and push inference-api (inference server)
        if: steps.changes.outputs.api == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          cache-from: type=gha,scope=inference-api
          cache-to: type=gha,mode=max,scope=inference-api
          tags: |
            ghcr.io/${{ github.repository_owner }}/inference-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/inference-api:latest

      - name: Build and push pipeline-kfp (pipeline base image)
        if: steps.changes.outputs.kfp == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.kfp
          platforms: linux/amd64
          push: true
          cache-from: type=gha,scope=pipeline-kfp
          cache-to: type=gha,mode=max,scope=pipeline-kfp
          tags: |
            ghcr.io/${{ github.repository_owner }}/pipeline-kfp:latest

      - name: Build and push autoresearch-loop (autoresearch loop)
        if: steps.changes.outputs.autoresearch == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.autoresearch
          platforms: linux/amd64
          push: true
          cache-from: type=gha,scope=autoresearch-loop
          cache-to: type=gha,mode=max,scope=autoresearch-loop
          tags: |
            ghcr.io/${{ github.repository_owner }}/autoresearch-loop:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/autoresearch-loop:latest

      # Open a GitHub-App-signed PR that pins the new image SHA in
      # k8s/deployment.yaml — same machinery the autoresearch loop uses for
      # its per-iter PRs. We deliberately go through a PR (not a direct push)
      # because main is protected by required status checks; a [skip ci]
      # direct push hits GH006 ("required checks expected"). The PR triggers
      # a fresh CI run, those checks pass, auto-merge fires, ArgoCD
      # reconciles. See scripts/ci_open_image_bump_pr.py for details.
      #
      # This path is for INFERENCE IMAGE bumps only — i.e. when api-affecting
      # code (`src/api.py`, Dockerfile, pyproject.toml, uv.lock) changed.
      # Autoresearch model-promotion PRs are a separate flow with a separate
      # branch prefix (`auto/run-…` vs `ci/image-bump-…`).
      - name: Open inference-image-bump PR (auto-merge)
        if: steps.changes.outputs.api == 'true'
        env:
          IMAGE_SHA: ${{ github.sha }}
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_INSTALLATION_ID: ${{ secrets.GH_INSTALLATION_ID }}
          GH_PEM_SECRET_PROJECT: ${{ secrets.GH_PEM_SECRET_PROJECT }}
          GH_PEM_SECRET_NAME: ${{ secrets.GH_PEM_SECRET_NAME }}
        run: uv run python scripts/ci_open_image_bump_pr.py

  compile-kfp:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Compile Kubeflow Pipeline
        run: uv run python pipelines/pipeline.py

      - name: Upload pipeline artifact
        uses: actions/upload-artifact@v4
        with:
          name: kfp-pipeline
          path: pipelines/pipeline.yaml
