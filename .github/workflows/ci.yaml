name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/ pipelines/

      - name: Format check
        run: uv run ruff format --check src/ tests/ pipelines/

      - name: Run tests
        run: uv run pytest tests/ -v

  pipeline:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write   # to push deployment.yaml image tag update back to main
      packages: write   # to push image to ghcr.io
      id-token: write   # for GCP Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Authenticate to GCS (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/399695368426/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: churn-cicd@project-8018ed81-1dfe-470e-aad.iam.gserviceaccount.com

      - name: Pull data from DVC
        run: uv run dvc pull

      - name: Start ephemeral MLflow tracking server
        run: |
          uv run mlflow server \
            --backend-store-uri=sqlite:///mlflow_ci.db \
            --artifacts-destination=./mlflow_artifacts \
            --serve-artifacts \
            --port 5000 &
          sleep 8

      - name: Run DVC pipeline
        run: uv run dvc repro
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000

      - name: Push updated artifacts to GCS
        run: uv run dvc push

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/churn-api:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/churn-api:latest \
            .
          docker push ghcr.io/${{ github.repository_owner }}/churn-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/churn-api:latest

      - name: Update deployment image tag and push
        run: |
          sed -i "s|image: ghcr.io/.*/churn-api:.*|image: ghcr.io/${{ github.repository_owner }}/churn-api:${{ github.sha }}|" k8s/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update churn-api image to ${{ github.sha }} [skip ci]"
          git push

  compile-kfp:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Compile Kubeflow Pipeline
        run: uv run python pipelines/churn_pipeline.py

      - name: Upload pipeline artifact
        uses: actions/upload-artifact@v4
        with:
          name: kfp-pipeline
          path: pipelines/churn_pipeline.yaml
